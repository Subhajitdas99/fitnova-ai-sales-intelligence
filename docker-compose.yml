services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fitnova-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/storage:/app/backend/storage
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fitnova-frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      - backend
