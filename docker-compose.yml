services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fitnova-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/backend/storage
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: fitnova-frontend
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_storage:
